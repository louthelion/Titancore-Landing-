<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TitanCore Holdings | Thank You</title>

  <style>
    :root{
      --green:#00a651;
      --gold:#d8b45a;
      --gold2:#f3d88b;
      --yellow:#ffd400;
      --border:rgba(216,180,90,.45);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left,rgba(0,166,81,.16),transparent 30%),
        linear-gradient(180deg,#000,#051006,#000);
      color:var(--gold2);
      font-family:Arial,Helvetica,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .card{
      width:min(760px,100%);
      border:1px solid var(--border);
      border-radius:18px;
      background:linear-gradient(180deg,rgba(9,13,12,.96),rgba(3,5,4,.99));
      padding:34px;
      text-align:center;
      box-shadow:0 18px 55px rgba(0,0,0,.65);
    }

    .logo{
      width:70px;
      height:70px;
      border-radius:12px;
      border:2px solid var(--gold);
      color:var(--yellow);
      display:grid;
      place-items:center;
      font-size:42px;
      font-weight:900;
      margin:0 auto 18px;
    }

    h1{
      color:var(--green);
      font-size:42px;
      margin:0 0 14px;
    }

    p{
      font-size:18px;
      line-height:1.55;
      margin:0 0 22px;
    }

    .actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
    }

    a{
      min-height:46px;
      padding:0 18px;
      border-radius:10px;
      border:1px solid var(--gold);
      color:var(--gold2);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-weight:900;
    }

    .gold{
      background:var(--yellow);
      color:#000;
      border-color:var(--yellow);
    }

    a:hover{
      background:var(--green);
      color:#fff;
      border-color:var(--green);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">T</div>
    <h1>Thank You</h1>
    <p>
      Your institution review request has been received. TitanCore Holdings will review the information
      and follow the appropriate contact path.
    </p>

    <div class="actions">
      <a class="gold" href="index.html">Back to Home</a>
      <a href="institution.html">Institution Page</a>
      <a href="contact.html">Contact TitanCore</a>
    </div>
  </div>
</body>
</html>
