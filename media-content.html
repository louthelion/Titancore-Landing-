<script>
  const tvSources = [
    { label: 'Bloomberg TV', src: 'https://www.youtube.com/embed/iEpJwprxDdk?autoplay=0&rel=0', official: 'https://www.youtube.com/@BloombergTV/streams', fallback: false },
    { label: 'CNBC', src: 'https://www.youtube.com/embed/f0bM4VZenOA?autoplay=0&rel=0', official: 'https://www.youtube.com/@CNBCtelevision/videos', fallback: false },
    { label: 'Yahoo Finance', src: '', official: 'https://finance.yahoo.com/video/', fallback: true },
    { label: 'DW Global News', src: 'https://www.youtube.com/embed/V9KZGs1MtP4?autoplay=0&rel=0', official: 'https://www.youtube.com/@dwnews/live', fallback: false },
    { label: 'Reuters Business', src: '', official: 'https://www.reuters.com/video/', fallback: true },
    { label: 'BNN Bloomberg', src: 'https://www.youtube.com/embed/YOHVUTE0uPQ?autoplay=0&rel=0', official: 'https://www.youtube.com/@BNNBloomberg/videos', fallback: false }

  const audioSources = [
    { label: 'Bloomberg Radio', src: 'https://www.youtube.com/embed/RJYpKBybG7U?autoplay=0&rel=0', official: 'https://www.youtube.com/@BloombergTV/streams', fallback: false, copy:'Live radio and market talk in one place. If a station limits playback, open the official source below.' },
    { label: 'BBC World Service', src: '', official: 'https://www.bbc.com/audio/play/live/bbc_world_service', fallback: true, copy:'BBC World Service is linked here as a live global business-news listening option.' },
    { label: 'Marketplace', src: '', official: 'https://www.marketplace.org/shows/marketplace/', fallback: true, copy:'Marketplace is included as a trusted business and economy listening source.' },
    { label: 'CoinDesk Crypto', src: 'https://www.youtube.com/embed/hM8yT0N8g4g?autoplay=0&rel=0', official: 'https://www.youtube.com/@CoinDesk/videos', fallback: false, copy:'Crypto-focused market listening and digital asset updates.' },
    { label: 'Yahoo Finance Audio', src: '', official: 'https://finance.yahoo.com/videos/', fallback: true, copy:'Yahoo Finance audio content may require the official source.' }
  ];

  const studioSources = [
    { label: 'TitanCore Studio Live', src: 'https://www.youtube.com/embed/5r0znE5-CwQ?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=live+business+education', fallback: false },
    { label: 'CEO Briefing Studio', src: 'https://www.youtube.com/embed/NsJSAlY8Smo?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=ceo+briefing+leadership+youtube', fallback: false },
    { label: 'Entrepreneur Guest Studio', src: 'https://www.youtube.com/embed/tbnzAVRZ9Xc?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=entrepreneur+interview+business+youtube', fallback: false },
    { label: 'Subsidiary Studio', src: 'https://www.youtube.com/embed/LB0YtqN0gkQ?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=business+subsidiary+operations+youtube', fallback: false }
  ];

  const studioAudioSources = [
    { label: 'Studio Live Audio', src: 'https://www.youtube.com/embed/6JwkaLt9pf8?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=business+audio+education', fallback: false, copy:'Future TitanCore studio listening experience with clean placeholder programming.' },
    { label: 'CEO Briefing Audio', src: 'https://www.youtube.com/embed/z9M0sRSeZt8?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=ceo+leadership+audio+business', fallback: false, copy:'Leadership and executive placeholder audio while TitanCore originals are prepared.' },
    { label: 'Entrepreneur Guest Audio', src: 'https://www.youtube.com/embed/XAD9J5A9W8U?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=entrepreneur+talk+audio+business', fallback: false, copy:'Entrepreneur guest placeholder programming in one shared audio area.' },
    { label: 'Subsidiary Update Audio', src: 'https://www.youtube.com/embed/aXJ7_3sVt7E?autoplay=0&rel=0', official: 'https://www.youtube.com/results?search_query=business+update+audio+education', fallback: false, copy:'Business update placeholder audio for future subsidiary reporting.' }
  ];

  const replayVideos = [
    { label:'Market Closing Replay', src:'https://www.youtube.com/embed/Ti-4h2j3r7o?rel=0', thumb:'https://i.ytimg.com/vi/Ti-4h2j3r7o/hqdefault.jpg', meta:'Markets recap replay' },
    { label:'Crypto Market Replay', src:'https://www.youtube.com/embed/hM8yT0N8g4g?rel=0', thumb:'https://i.ytimg.com/vi/hM8yT0N8g4g/hqdefault.jpg', meta:'Digital assets replay' },
    { label:'Energy Desk Replay', src:'https://www.youtube.com/embed/ZtV1Q6F7N4A?rel=0', thumb:'https://i.ytimg.com/vi/ZtV1Q6F7N4A/hqdefault.jpg', meta:'Energy and commodities replay' },
    { label:'Real Estate Replay', src:'https://www.youtube.com/embed/nM8dMju5qk0?rel=0', thumb:'https://i.ytimg.com/vi/nM8dMju5qk0/hqdefault.jpg', meta:'Economy and CRE replay' },
    { label:'Leadership Replay', src:'https://www.youtube.com/embed/k7qQ3g3ofJw?rel=0', thumb:'https://i.ytimg.com/vi/k7qQ3g3ofJw/hqdefault.jpg', meta:'Leadership and growth replay' }
  ];

  function setupVideoTabs({sources, tabsId, iframeId, messageId, officialId}) {
    const tabs = document.getElementById(tabsId);
    const iframe = document.getElementById(iframeId);
    const msg = document.getElementById(messageId);
    const official = document.getElementById(officialId);

    if (!tabs || !iframe || !msg || !official) return;

    function activate(source, btn){
      [...tabs.children].forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      official.href = source.official;

      if(source.fallback){
        iframe.src = 'about:blank';
        msg.classList.add('show');
      } else {
        iframe.src = source.src;
        msg.classList.remove('show');
      }

      iframe.title = source.label;
    }

    sources.forEach((source, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
      btn.textContent = source.label;
      btn.addEventListener('click', () => activate(source, btn));
      tabs.appendChild(btn);
    });

    if (sources.length && tabs.children.length) {
      activate(sources[0], tabs.children[0]);
    }
  }

  function setupAudioTabs({sources, tabsId, iframeId, officialId, titleId, copyId, fallbackId, embedWrapId}) {
    const tabs = document.getElementById(tabsId);
    const iframe = document.getElementById(iframeId);
    const official = document.getElementById(officialId);
    const title = document.getElementById(titleId);
    const copy = document.getElementById(copyId);
    const fallback = document.getElementById(fallbackId);
    const embedWrap = document.getElementById(embedWrapId);

    if (!tabs || !iframe || !official || !title || !copy || !fallback || !embedWrap) return;

    function activate(source, btn){
      [...tabs.children].forEach(x => x.classList.remove('active'));
      btn.classList.add('active');

      title.textContent = source.label;
      copy.textContent = source.copy || 'Business audio placeholder.';
      official.href = source.official;

      if(source.fallback){
        iframe.src = 'about:blank';
        fallback.classList.add('show');
        embedWrap.style.display = 'none';
      } else {
        iframe.src = source.src;
        fallback.classList.remove('show');
        embedWrap.style.display = 'flex';
      }

      iframe.title = source.label;
    }

    sources.forEach((source, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
      btn.textContent = source.label;
      btn.addEventListener('click', () => activate(source, btn));
      tabs.appendChild(btn);
    });

    if (sources.length && tabs.children.length) {
      activate(sources[0], tabs.children[0]);
    }
  }

  function setupReplay(){
    const list = document.getElementById('replay-thumbs');
    const player = document.getElementById('replay-player');

    if (!list || !player) return;

    replayVideos.forEach((item, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'thumb-btn' + (index === 0 ? ' active' : '');

      btn.innerHTML = 
        <span class="thumb-preview">
          ${item.thumb}
        </span>
        <span>
          <span class="thumb-title">${item.label}</span>
          <span class="thumb-meta">${item.meta}</span>
        </span>
      ;

      btn.addEventListener('click', () => {
        [...list.children].forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        player.src = item.src;
        player.title = item.label;
      });

      list.appendChild(btn);
    });
  }

  setupVideoTabs({sources:tvSources, tabsId:'tv-tabs', iframeId:'tv-player', messageId:'tv-message', officialId:'tv-official'});
  setupAudioTabs({sources:audioSources, tabsId:'audio-tabs', iframeId:'audio-player', officialId:'audio-official', titleId:'audio-title', copyId:'audio-copy', fallbackId:'audio-message', embedWrapId:'audio-embed-wrap'});
  setupVideoTabs({sources:studioSources, tabsId:'studio-tabs', iframeId:'studio-player', messageId:'studio-message', officialId:'studio-official'});
  setupAudioTabs({sources:studioAudioSources, tabsId:'studio-audio-tabs', iframeId:'studio-audio-player', officialId:'studio-audio-official', titleId:'studio-audio-title', copyId:'studio-audio-copy', fallbackId:'studio-audio-message', embedWrapId:'studio-audio-embed-wrap'});
  setupReplay();
</script>
