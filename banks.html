<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bank Relationship - TitanCore Holdings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <div class="head">
        <div class="logo">TC</div>
        <div class="titleblock">
          <h1>Bank Relationship</h1>
          <p>TitanCore Holdings • Banking & Institutional Access</p>
        </div>
      </div>

      <div class="hr"></div>

      <form id="titancore-banks-form" name="titancore-banks" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="titancore-banks" />
        <input type="hidden" name="company" value="TitanCore Holdings" />
        <input type="hidden" name="form_type" value="banks" />
        <p style="display:none;">
          <label>Don’t fill this out: <input name="bot-field" /></label>
        </p>

        <div class="formfields">
          <label>Full Name (Required)
            <input name="full_name" required placeholder="Your full name" />
          </label>

          <label>Email (Required)
            <input name="email" type="email" required placeholder="you@example.com" />
          </label>

          <label>Phone (Required)
            <input name="phone" required placeholder="Phone number" />
          </label>

          <label>Bank Name (Required)
            <input name="bank_name" required placeholder="Bank name" />
          </label>

          <label>Department / Role (Required)
            <input name="role" required placeholder="Relationship Manager, Lending, Treasury..." />
          </label>

          <label>Relationship Type (Required)
            <select name="service" required>
              <option value="" selected disabled>Select one</option>
              <option>Deposit relationship</option>
              <option>Lending relationship</option>
              <option>Treasury / cash management</option>
              <option>Strategic banking relationship</option>
              <option>Other</option>
            </select>
          </label>

          <label>Geography / Coverage (Required)
            <input name="coverage" required placeholder="US, Florida, Southeast..." />
          </label>

          <label>Requirements / Process (Required)
            <textarea name="requirements" required placeholder="Tell us your onboarding or relationship requirements"></textarea>
          </label>

          <label>Message / Notes (Required)
            <textarea name="notes" required placeholder="Additional notes"></textarea>
          </label>

          <div class="formactions">
            <button class="btn btnfull" type="submit">Submit</button>
          </div>
        </div>

        <div class="thanks" style="display:none;">
          <h2>Thank You</h2>
          <p>We received your Bank Relationship submission.</p>
          <div class="notice" style="margin-top:14px;">
            <strong>Notice:</strong> TitanCore reviews submissions and routes them internally for follow-up.
          </div>
        </div>

        <div class="footer" style="margin-top:24px;">
          <div class="line"><strong>Central Line:</strong> (800) 827-9016</div>
          <div class="line"><strong>Email:</strong> contact@titancoreholdings.com</div>
        </div>
      </form>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("titancore-banks-form");
      const thanksBox = document.querySelector(".thanks");
      if (!form || !thanksBox) return;

      form.addEventListener("submit", function () {
        setTimeout(function () {
          thanksBox.style.display = "block";
        }, 500);
      });
    });
  </script>
</body>
</html>
