<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Investor Access - TitanCore Holdings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <div class="head">
        <div class="logo">TC</div>
        <div class="titleblock">
          <h1>Investor Access</h1>
          <p>TitanCore Holdings • Investor Relations</p>
        </div>
      </div>

      <div class="hr"></div>

      <form id="titancore-investors-form" name="titancore-investors" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="titancore-investors" />
        <input type="hidden" name="company" value="TitanCore Holdings" />
        <input type="hidden" name="form_type" value="investors" />
        <p style="display:none;">
          <label>Don’t fill this out: <input name="bot-field" /></label>
        </p>

        <div class="formfields">
          <label>Full Name (Required)
            <input name="full_name" required placeholder="Your full name" />
          </label>

          <label>Email (Required)
            <input name="email" type="email" required placeholder="you@example.com" />
          </label>

          <label>Phone (Required)
            <input name="phone" required placeholder="Phone number" />
          </label>

          <label>Investor / Firm Name (Required)
            <input name="investor_name" required placeholder="Investor or firm name" />
          </label>

          <label>Title / Role (Required)
            <input name="role" required placeholder="Investor, Partner, Principal..." />
          </label>

          <label>Investor Type (Required)
            <select name="investor_type" required>
              <option value="" selected disabled>Select one</option>
              <option>Individual Investor</option>
              <option>Family Office</option>
              <option>Private Group</option>
              <option>Institutional Investor</option>
              <option>Other</option>
            </select>
          </label>

          <label>Relationship Objective (Required)
            <select name="service" required>
              <option value="" selected disabled>Select one</option>
              <option>General investment inquiry</option>
              <option>Strategic relationship</option>
              <option>Capital participation</option>
              <option>Other</option>
            </select>
          </label>

          <label>Investment Range (Required)
            <select name="capacity_range" required>
              <option value="" selected disabled>Select one</option>
              <option>Under $50k</option>
              <option>$50k - $250k</option>
              <option>$250k - $1M</option>
              <option>$1M+</option>
            </select>
          </label>

          <label>Requirements / Process (Required)
            <textarea name="requirements" required placeholder="Tell us your requirements or process"></textarea>
          </label>

          <label>Message / Notes (Required)
            <textarea name="notes" required placeholder="Additional notes"></textarea>
          </label>

          <div class="formactions">
            <button class="btn btnfull" type="submit">Submit</button>
          </div>
        </div>

        <div class="thanks" style="display:none;">
          <h2>Thank You</h2>
          <p>We received your Investor submission.</p>
          <div class="notice" style="margin-top:14px;">
            <strong>Notice:</strong> TitanCore reviews submissions and routes them internally for follow-up.
          </div>
        </div>

        <div class="footer" style="margin-top:24px;">
          <div class="line"><strong>Central Line:</strong> (800) 827-9016</div>
          <div class="line"><strong>Email:</strong> contact@titancoreholdings.com</div>
        </div>
      </form>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("titancore-investors-form");
      const thanksBox = document.querySelector(".thanks");
      if (!form || !thanksBox) return;

      form.addEventListener("submit", function () {
        setTimeout(function () {
          thanksBox.style.display = "block";
        }, 500);
      });
    });
  </script>
</body>
</html>
